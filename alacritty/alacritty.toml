working_directory = "None"

live_config_reload = true

# everforest_dark hardhacker nightfox catppuccin
# import = ["~/.config/alacritty/themes/themes/nightfox.yaml"]

#[env]
#TERM = "xterm-256color"

[font]
size = 10.0

[font.normal]
family = "Iosevka Fixed"
style = "Light"

[cursor]
blink_interval = 500
blink_timeout = 0
unfocused_hollow = true

[mouse]
hide_when_typing = true

[cursor.style]
shape = "Block"
blinking = "Always"

#[colors]
#draw_bold_text_with_bright_colors = false

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "Enter"
mods = "Alt"

[[keyboard.bindings]]
action = "Paste"
key = "v"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "c"
mods = "Control|Shift"

